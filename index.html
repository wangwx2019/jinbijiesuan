            if (existingChart) existingChart.destroy();
            const chart = new Chart(ctx, {
                type: type,
                data: {
                    labels: labels,
                    datasets: [{
                        label: label,
                        data: data,
                        backgroundColor: colors,
                        borderColor: '#fff',
                        borderWidth: isPie ? 2 : 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { display: isPie, position: 'bottom', labels: { boxWidth: 12, padding: 8, font: { size: 11 } } },
                        tooltip: { callbacks: { label: ctx => `${ctx.label}: ${ctx.parsed} 次` } }
                    },
                    scales: isPie ? {} : {
                        y: { beginAtZero: true, ticks: { stepSize: 1, precision: 0 } },
                        x: { ticks: { maxRotation: 45, font: { size: 10 } } }
                    }
                }
            });
            weekChartInstances.push(chart);
        }

        function editRuleScore(ruleId, ruleType) {
            const rules = ruleType === 'add' ? addRules : minusRules;
            const rule = rules.find(item => item.id === ruleId);
            if (!rule) return;

            // 保存当前编辑的规则信息

            // 显示自定义弹窗
            const infoText = `正在修改「${rule.name}」的分值\n当前分值：${rule.score}\n${ruleType === 'add' ? '请输入正整数' : '请输入负整数'}`;

            document.getElementById('editScoreInput').value = rule.score;
            document.getElementById('editScoreModal').classList.add('show');
        }

        // 保存修改分值
        function saveEditScore() {
            if (!currentEditRule) return;

            const { id, type, rule } = currentEditRule;
            const newScore = parseInt(document.getElementById('editScoreInput').value);

            // 数值校验
            if (isNaN(newScore)) {
                showTip('请输入有效的数字');
                return;
            }
            if (type === 'add' && newScore <= 0) {
                showTip('加分规则必须输入正整数');
                return;
            }
            if (type === 'minus' && newScore >= 0) {
                showTip('扣分规则必须输入负整数');
                return;
            }

            // 更新规则
            if (type === 'add') {
                addRules = addRules.map(item => item.id === id ? { ...item, score: newScore } : item);
            } else {
                minusRules = minusRules.map(item => item.id === id ? { ...item, score: newScore } : item);
            }

            // 保存并重新渲染
            saveRules();
            forceRenderItemGrid();
            renderRuleLists();

            closeModalWithFocus('editScoreModal');
            currentEditRule = null;
            showTip(`「${rule.name}」分值修改成功！`);

            // 加分/扣分弹窗内：拖拽排序
            function initGridDrag(grid) {
                let dragSrc = null;
                let dragIndex = -1;
                let offsetX = 0, offsetY = 0;

                function getRules() {
                    return grid.id === 'addItemGrid' ? addRules : minusRules;
                }
                function setRules(rules) {
                    if (grid.id === 'addItemGrid') addRules = rules; else minusRules = rules;
                }

                function onStart(e) {
                    const grip = e.target.closest('.item-grip');
                    if (!grip) return;
                    const wrap = grip.closest('.item-btn-wrap');
                    if (!wrap) return;
                    e.preventDefault();
                    const cx = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
                    const cy = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
                    dragSrc = wrap;
                    dragIndex = parseInt(wrap.dataset.index);
                    offsetX = cx;
                    offsetY = cy;
                    wrap.classList.add('dragging');
                    wrap.style.transition = 'none';
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onEnd);
                    document.addEventListener('touchmove', onMove, { passive: false });
                    document.addEventListener('touchend', onEnd);
                }

                function onMove(e) {
                    if (!dragSrc) return;
                    e.preventDefault();
                    const cx = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                    const cy = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
                    dragSrc.style.transform = `translate(${cx - offsetX}px, ${cy - offsetY}px)`;
                    grid.querySelectorAll('.item-btn-wrap').forEach(w => w.classList.remove('drag-over'));
                    const el = document.elementFromPoint(cx, cy);
                    if (el) {
                        const target = el.closest('.item-btn-wrap');
                        if (target && target !== dragSrc) target.classList.add('drag-over');
                    }
                }

                function onEnd(e) {
                    if (!dragSrc) { cleanup(); return; }
                    const targetWrap = grid.querySelector('.item-btn-wrap.drag-over');
                    if (targetWrap) {
                        const targetIndex = parseInt(targetWrap.dataset.index);
                        const rules = getRules();
                        if (dragIndex >= 0 && dragIndex < rules.length && targetIndex >= 0 && targetIndex < rules.length && dragIndex !== targetIndex) {
                            const [moved] = rules.splice(dragIndex, 1);
                            rules.splice(targetIndex, 0, moved);
                            setRules(rules);
                            saveRules();
                            renderItemGrid();
                        }
                    }
                    cleanup();
                }

                function cleanup() {
                    if (dragSrc) {
                        dragSrc.style.transition = '';
                        dragSrc.style.transform = '';
                        dragSrc.classList.remove('dragging');
                    }
                    grid.querySelectorAll('.item-btn-wrap').forEach(w => w.classList.remove('drag-over'));
                    dragSrc = null;
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onEnd);
                    document.removeEventListener('touchmove', onMove);
                    document.removeEventListener('touchend', onEnd);
                }

                grid.addEventListener('mousedown', onStart);
                grid.addEventListener('touchstart', onStart, { passive: false });
            }

            // 左滑删除 - 触摸事件委托

            // 拖拽排序
            document.querySelectorAll('#addRuleList, #minusRuleList').forEach(list => {
                let dragSrc = null;
                let dragClone = null;
                let dragOffsetY = 0;

                list.addEventListener('mousedown', (e) => {
                    const handle = e.target.closest('.drag-handle');
                    if (!handle) return;
                    const item = handle.closest('.rule-item-with-edit');
                    if (!item || item.classList.contains('editing')) return;
                    e.preventDefault();
                    startDrag(item, e.clientY);
                    function onMove(ev) { doDrag(ev.clientY); }
                    function onUp(ev) {
                        endDrag(ev.clientY);
                        document.removeEventListener('mousemove', onMove);
                        document.removeEventListener('mouseup', onUp);
                    }
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                });

                list.addEventListener('touchstart', (e) => {
                    const handle = e.target.closest('.drag-handle');
                    if (!handle) return;
                    const item = handle.closest('.rule-item-with-edit');
                    if (!item || item.classList.contains('editing')) return;
                    if (dragSrc) return;
                    const touch = e.touches[0];
                    startDrag(item, touch.clientY);
                    function onMove(ev) {
                        ev.preventDefault();
                        doDrag(ev.touches[0].clientY);
                    }
                    function onUp(ev) {
                        const touch = ev.changedTouches[0];
                        endDrag(touch.clientY);
                        document.removeEventListener('touchmove', onMove);
                        document.removeEventListener('touchend', onUp);
                    }
                    document.addEventListener('touchmove', onMove, { passive: false });
                    document.addEventListener('touchend', onUp, { passive: true });
                }, { passive: true });

                function startDrag(item, clientY) {
                    dragSrc = item;
                    const rect = item.getBoundingClientRect();
                    dragOffsetY = clientY - rect.top;
                    item.classList.add('dragging');
                    item.style.transition = 'none';
                }

                function doDrag(clientY) {
                    if (!dragSrc) return;
                    const listRect = list.getBoundingClientRect();
                    const y = clientY - listRect.top - dragOffsetY;
                    dragSrc.style.transform = `translateY(${y}px)`;

                    const items = [...list.querySelectorAll('.rule-item-with-edit:not(.dragging)')];
                    const srcIndex = items.findIndex(el => el.dataset.index === dragSrc.dataset.index);
                    // Find which item to swap with by position
                    for (const item of items) {
                        const rect = item.getBoundingClientRect();
                        const mid = rect.top + rect.height / 2;
                        if (clientY > mid && parseInt(item.dataset.index) > parseInt(dragSrc.dataset.index)) {
                            item.classList.add('drag-over');
                        } else if (clientY < mid && parseInt(item.dataset.index) < parseInt(dragSrc.dataset.index)) {
                            item.classList.add('drag-over');
                        } else {
                            item.classList.remove('drag-over');
                        }
                    }
                }

                function endDrag(clientY) {
                    if (!dragSrc) return;
                    dragSrc.style.transition = '';
                    dragSrc.style.transform = '';
                    dragSrc.classList.remove('dragging');

                    // Find target position
                    const items = [...list.querySelectorAll('.rule-item-with-edit')];
                    const srcIndex = items.indexOf(dragSrc);
                    let targetIndex = srcIndex;

                    for (let i = 0; i < items.length; i++) {
                        if (i === srcIndex) continue;
                        const rect = items[i].getBoundingClientRect();
                        const mid = rect.top + rect.height / 2;
                        if (clientY > mid && i > targetIndex) targetIndex = i;
                        if (clientY < mid && i < targetIndex) targetIndex = i;
                        items[i].classList.remove('drag-over');
                    }

                    if (targetIndex !== srcIndex) {
                        // Reorder the array
                        const isAdd = list.id === 'addRuleList';
                        const rules = isAdd ? addRules : minusRules;
                        const [moved] = rules.splice(srcIndex, 1);
                        rules.splice(targetIndex, 0, moved);
                        if (isAdd) addRules = rules; else minusRules = rules;
                        saveRules();
                        renderRuleLists();
                        renderItemGrid();
                    }

                    dragSrc = null;
                    dragClone = null;
                }
            });

            // 底部 Sheet 新增规则
            let addRuleType = 'add'; // 'add' or 'minus'
            document.querySelectorAll('.add-rule-trigger').forEach(btn => {
                btn.addEventListener('click', () => {
                    addRuleType = btn.dataset.type;
                    const isAdd = addRuleType === 'add';
                    document.getElementById('sheetTitle').textContent = isAdd ? '新增加分规则' : '新增扣分规则';
                    document.getElementById('sheetScoreHint').textContent = isAdd ? '正数加分' : '负数扣分';
                    document.getElementById('sheetRuleName').value = '';
                    document.getElementById('sheetRuleScore').value = '';
                    document.getElementById('sheetRuleName').focus();
                    document.getElementById('addRuleSheet').classList.add('show');
                });
            });
            document.getElementById('cancelAddRule').addEventListener('click', () => {
                closeModalWithFocus('addRuleSheet');
            });
            document.getElementById('addRuleSheet').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) {
                    closeModalWithFocus('addRuleSheet');
                }
            });
            document.getElementById('confirmAddRule').addEventListener('click', doAddRuleFromSheet);
            document.getElementById('sheetRuleScore').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') doAddRuleFromSheet();
            });
            document.getElementById('sheetRuleName').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') document.getElementById('sheetRuleScore').focus();
            });
            function doAddRuleFromSheet() {
                const name = document.getElementById('sheetRuleName').value.trim();
                const score = parseInt(document.getElementById('sheetRuleScore').value);
                if (!name) {
                    showTip('请输入规则名称');
                    return;
                }
                if (isNaN(score)) {
                    showTip('请输入有效的分值');
                    return;
                }
                if (addRuleType === 'add' && score <= 0) {
                    showTip('加分规则分值必须为正整数');
                    return;
                }
                if (addRuleType === 'minus' && score >= 0) {
                    showTip('扣分规则分值必须为负整数');
                    return;
                }

                const newRule = {
                    id: addRuleType === 'add' ? 'ADD_' + Date.now() : 'MINUS_' + Date.now(),
                    name: name,
                    score: score
                };
                if (addRuleType === 'add') {
                    addRules.push(newRule);
                } else {
                    minusRules.push(newRule);
                }
                saveRules();
                renderRuleLists();
                renderItemGrid();
                animateLastRule(addRuleType === 'add' ? 'addRuleList' : 'minusRuleList');
                closeModalWithFocus('addRuleSheet');
                showTip(addRuleType === 'add' ? '加分规则新增成功！' : '扣分规则新增成功！');
            }

            // 导出与同步功能
            document.getElementById('exportDataBtn').addEventListener('click', () => {
                document.getElementById('exportModal').classList.add('show');
                focusFirstInModal(document.getElementById('exportModal'));
            });
            document.getElementById('doExport').addEventListener('click', exportGoldData);
            document.getElementById('doImport').addEventListener('click', () => {
                document.getElementById('importFileInput').click();
            });
            document.getElementById('importFileInput').addEventListener('change', importGoldData);
            document.getElementById('syncDataBtn').addEventListener('click', () => {
                const saved = localStorage.getItem('github_token_gold');
                if (saved) document.getElementById('syncTokenInput').value = deobfuscateToken(saved);
                document.getElementById('syncStatus').textContent = '就绪';
                document.getElementById('syncStatus').style.cssText = 'font-size:13px;color:#475569;text-align:center;min-height:20px;padding:8px 12px;border-radius:10px;background:#f8fafc;margin-bottom:10px;';
                document.getElementById('syncModal').classList.add('show');
                focusFirstInModal(document.getElementById('syncModal'));
            });
            // 同步按钮：先更新状态再执行同步
            document.getElementById('doSyncToGithub').addEventListener('click', () => {
                syncGoldToGithub();
            });
            // 关闭按钮
            document.getElementById('closeExportModal').addEventListener('click', () => {
                closeModalWithFocus('exportModal');
            });
            document.getElementById('closeSyncModal').addEventListener('click', () => {
                closeModalWithFocus('syncModal');
            });
        }

        // ===== 导出/导入功能 =====
        function closeModal(id) {
            closeModalWithFocus(id);
        }
        function exportGoldData() {
            if (!todayData.records.length && !weekData.length) {
                showTip('暂无数据可导出');
                return;
            }
            const data = { todayData, weekData, addRules, minusRules, exportTime: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const now = new Date();
            const ds = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            a.download = `jinbitongji-backup-${ds}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showTip('✅ 数据导出成功！文件已下载。');
        }
        function importGoldData(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const d = JSON.parse(ev.target.result);
                    if (!d.todayData || !d.weekData) {
                        showTip('❌ 文件格式不正确');
                        return;
                    }
                    todayData = d.todayData;
                    weekData = d.weekData || [];
                    if (d.addRules) { addRules = d.addRules; saveRules(); }
                    if (d.minusRules) { minusRules = d.minusRules; saveRules(); }
                    saveData();
                    renderCoin();
                    renderRecordList();
                    renderItemGrid();
                    closeModalWithFocus('exportModal');
                    showTip('✅ 数据导入成功！');
                } catch(err) {
                    showTip('❌ 文件解析失败：' + err.message);
                }
            };
            reader.readAsText(file);
            e.target.value = '';
        }

        // ===== GitHub同步功能 =====
        async function syncGoldToGithub() {
            const rawToken = localStorage.getItem('github_token_gold');
            const token = deobfuscateToken(rawToken);
            if (!token) { showTip('❌ 请先配置 GitHub Token'); return; }
            const data = { todayData, weekData, addRules, minusRules, exportTime: new Date().toISOString() };
            const statusEl = document.getElementById('syncStatus');
            statusEl.textContent = '⏳ 正在同步...';
            statusEl.style.cssText = 'font-size:13px;color:#475569;text-align:center;min-height:20px;padding:8px 12px;border-radius:10px;background:#fff3cd;margin-bottom:10px;';
            try {
                const url = `https://api.github.com/repos/${GOLD_GITHUB_REPO}/contents/${GOLD_GITHUB_PATH}`;
                let sha = null;
                let remoteData = null;
                const check = await fetch(url, { headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json' } });
                if (check.ok) {
                    const remoteFile = await check.json();
                    sha = remoteFile.sha;
                    try {
                        remoteData = JSON.parse(decodeURIComponent(escape(atob(remoteFile.content))));
                    } catch(e) {}
                } else if (check.status !== 404) {
                    const e = await check.json();
                    statusEl.textContent = '❌ ' + e.message;
                    statusEl.style.background = '#fee2e2';
                    return;
                }
                // 冲突检测：如果远程数据更新，提示用户
                if (remoteData && remoteData.exportTime) {
                    const remoteTime = new Date(remoteData.exportTime).getTime();
                    const localTime = new Date(data.exportTime).getTime();
                    if (remoteTime > localTime) {
                        statusEl.innerHTML = '⚠️ 远程数据更新（' + new Date(remoteData.exportTime).toLocaleString('zh-CN') + '）<br><span style="font-size:12px;">点击同步将覆盖远程数据</span>';
                        statusEl.style.background = '#fef3c7';
                        // 添加覆盖按钮
                        const overrideBtn = document.createElement('button');
                        overrideBtn.textContent = '确认覆盖';
                        overrideBtn.style.cssText = 'margin-top:8px;padding:6px 16px;border:none;border-radius:8px;background:#f59e0b;color:white;font-weight:600;cursor:pointer;';
                        overrideBtn.onclick = async () => {
                            overrideBtn.remove();
                            await doSyncToGithub(data, sha, token, statusEl);
                        };
                        statusEl.appendChild(overrideBtn);
                        return;
                    }
                }
                await doSyncToGithub(data, sha, token, statusEl);
            } catch(e) {
                statusEl.textContent = '❌ ' + e.message;
                statusEl.style.background = '#fee2e2';
            }
        }
        async function doSyncToGithub(data, sha, token, statusEl) {
            statusEl.textContent = '⏳ 正在同步...';
            statusEl.style.cssText = 'font-size:13px;color:#475569;text-align:center;min-height:20px;padding:8px 12px;border-radius:10px;background:#fff3cd;margin-bottom:10px;';
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
            const url = `https://api.github.com/repos/${GOLD_GITHUB_REPO}/contents/${GOLD_GITHUB_PATH}`;
            const body = { message: `金币数据同步 ${new Date().toLocaleString('zh-CN')}`, content };
            if (sha) body.sha = sha;
            const res = await fetch(url, { method: 'PUT', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' }, body: JSON.stringify(body) });
            if (res.ok) {
                statusEl.textContent = '✅ 同步成功！';
                statusEl.style.cssText = 'font-size:13px;color:#475569;text-align:center;min-height:20px;padding:8px 12px;border-radius:10px;background:#d1fae5;margin-bottom:10px;';
            } else {
                const e = await res.json();
                statusEl.textContent = '❌ ' + e.message;
                statusEl.style.background = '#fee2e2';
            }
        }

        // 原有规则操作函数
        function handleRuleAction(e, type) {
            const target = e.target;
            const rules = type === 'add' ? addRules : minusRules;
            const listId = type === 'add' ? 'addRuleList' : 'minusRuleList';

            if (target.classList.contains('rule-edit-btn')) {
                const index = parseInt(target.dataset.index);
                const ruleItem = document.querySelector(`#${listId} .rule-item-with-edit[data-type="${type}"][data-index="${index}"]`);
                ruleItem.classList.add('editing');
            }

            if (target.classList.contains('rule-edit-cancel')) {
                const index = parseInt(target.dataset.index);
                const ruleItem = document.querySelector(`#${listId} .rule-item-with-edit[data-type="${type}"][data-index="${index}"]`);
                ruleItem.classList.remove('editing');
            }

            if (target.classList.contains('rule-edit-save')) {
                const index = parseInt(target.dataset.index);
                const ruleItem = document.querySelector(`#${listId} .rule-item-with-edit[data-type="${type}"][data-index="${index}"]`);
                const newName = ruleItem.querySelector('.rule-edit-input').value.trim();
                const newScore = parseInt(ruleItem.querySelector('.rule-edit-score').value);

                if (!newName) {
                    showTip('规则名称不能为空');
                    return;
                }
                if (isNaN(newScore)) {
                    showTip('请输入有效的分值');
                    return;
                }
                if (type === 'add' && newScore <= 0) {
                    showTip('加分规则分值必须为正整数');
                    return;
                }
                if (type === 'minus' && newScore >= 0) {
                    showTip('扣分规则分值必须为负整数');
                    return;
                }

                if (type === 'add') {
                    addRules[index] = { ...addRules[index], name: newName, score: newScore };
                } else {
                    minusRules[index] = { ...minusRules[index], name: newName, score: newScore };
                }

                saveRules();
                renderRuleLists();
                renderItemGrid();
                showTip('规则修改成功！');
            }

            if (target.classList.contains('rule-delete-btn')) {
                const index = parseInt(target.dataset.index);
                const ruleName = rules[index].name;
                const ruleItem = target.closest('.rule-item-with-edit');
                showConfirm(`确认删除${type === 'add' ? '加分' : '扣分'}规则「${ruleName}」？`, () => {
                    if (ruleItem) {
                        ruleItem.classList.add('rule-removing');
                        setTimeout(() => {
                            if (type === 'add') {
                                addRules.splice(index, 1);
                            } else {
                                minusRules.splice(index, 1);
                            }
                            saveRules();
                            renderRuleLists();
                            renderItemGrid();
                            showTip('规则删除成功！');
                        }, RULE_ANIMATION_DURATION);
                    } else {
                        // fallback if element not found
                        if (type === 'add') {
                            addRules.splice(index, 1);
                        } else {
                            minusRules.splice(index, 1);
                        }
                        saveRules();
                        renderRuleLists();
                        renderItemGrid();
                        showTip('规则删除成功！');
                    }
                });
            }
        }
        init();
    </script>
